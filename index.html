<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RCCG Living Water Bible Study Quiz</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .group-selector { display: flex; gap: .8rem; margin-bottom: 1.4rem; }
    .group-btn {
      flex: 1; padding: .7rem;
      border: 2px solid var(--parchment2);
      border-radius: 8px; background: #fffdf5;
      font-family: var(--font-head); font-size: 1rem;
      cursor: pointer; text-align: center;
      transition: border-color .18s, background .18s;
      color: var(--ink-soft);
    }
    .group-btn:hover { border-color: var(--gold); }
    .group-btn.active { border-color: var(--gold); background: var(--gold-pale); color: var(--ink); font-weight: 700; }
    .group-btn .g-icon { font-size: 1.5rem; display: block; margin-bottom: .2rem; }

    .verse {
      font-style: italic; font-size: .95rem;
      color: var(--ink-soft); text-align: center;
      margin-top: 1.5rem; padding-top: 1rem;
      border-top: 1px solid var(--parchment2);
    }
    .verse cite { display: block; font-size: .8rem; margin-top: .2rem; color: var(--gold); font-style: normal; }

    .admin-link {
      margin-top: 1.2rem; text-align: center; font-size: .85rem;
    }
    .admin-link a { color: var(--gold); text-decoration: none; font-weight: 600; }
    .admin-link a:hover { text-decoration: underline; }

    body {
      background-image: url('https://images.unsplash.com/photo-1504052434569-70ad5836ab65?w=1400&q=60');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
    }

    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background: rgba(245, 239, 224, 0.72);
      backdrop-filter: blur(3px);
    }

    /* Footer must sit above the body::after overlay */
    footer {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 1.2rem 1rem;
      font-size: .82rem;
      color: #fff;
      font-family: var(--font-body);
      font-style: italic;
      letter-spacing: .03em;
      text-shadow: 0 1px 4px rgba(0,0,0,.5);
    }
  </style>
</head>
<body>
<div class="page-wrap">
  <div class="card">

    <div class="app-header">
      <img src="rccg-logo.png" alt="RCCG Logo" style="height:72px; width:auto; margin-bottom:.5rem; display:block; margin-left:auto; margin-right:auto;" />
      <h1>RCCG Living Water Bible Study Quiz</h1>
      <p class="subtitle">Computer Based Exam</p>
    </div>

    <div id="alert-box" style="display:none"></div>

    <div class="divider">Select Your Class</div>

    <div class="group-selector">
      <button class="group-btn active" data-group="youth" onclick="selectGroup(this)">
        <span class="g-icon">🧒</span>
        YAYA Class
      </button>
      <button class="group-btn" data-group="adult" onclick="selectGroup(this)">
        <span class="g-icon">📖</span>
        Adult Class
      </button>
    </div>

    <div class="form-group">
      <label for="inp-name">Student's Name</label>
      <input type="text" id="inp-name" placeholder="Enter your full name" autocomplete="off" />
    </div>

    <div class="form-group">
      <label for="inp-pin">Your PIN</label>
      <input type="password" id="inp-pin" placeholder="Enter the PIN given to you" autocomplete="off"
             onkeydown="if(event.key==='Enter') doLogin()" />
    </div>

    <button class="btn btn-primary btn-full" onclick="doLogin()">
      Begin Exam &nbsp;→
    </button>

    <p class="verse">
      "Study to shew thyself approved unto God…"
      <cite>— 2 Timothy 2:15</cite>
    </p>

    <div class="admin-link">
      <a href="admin.html">⚙ Admin Panel</a>
    </div>

  </div>
</div>

<footer>
  ✦ Built for RCCG Living Water &mdash; by obatom19 ✦
</footer>

<script src="app.js"></script>
<script>
  let selectedGroup = 'youth';

  function selectGroup(btn) {
    document.querySelectorAll('.group-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedGroup = btn.dataset.group;
  }

  function showAlert(msg, type = 'error') {
    const box = document.getElementById('alert-box');
    box.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
    box.style.display = 'block';
  }

  async function doLogin() {
    const name = document.getElementById('inp-name').value.trim();
    const pin  = document.getElementById('inp-pin').value.trim();

    if (!name) { showAlert('Please enter your full name.'); return; }
    if (!pin)  { showAlert('Please enter your PIN.'); return; }

    showAlert('Checking details, please wait…', 'info');

    const result = await CBT.studentLogin(name, pin);

    if (!result.ok) { showAlert(result.error); return; }

    if (result.student.group !== selectedGroup) {
      const correct = result.student.group === 'youth' ? 'YAYA' : 'Adult';
      showAlert(`You are registered in the <strong>${correct}</strong> class. Please select the correct class above.`);
      return;
    }

    if (result.student.done) {
      showAlert('You have already submitted this exam. Contact the admin if this is a mistake.', 'info');
      return;
    }

    window.location.href = 'exam.html';
  }
</script>
</body>
</html>
